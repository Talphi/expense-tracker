<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eating Out – Split Flow</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1C1B19;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      gap: 0;
    }
    .phone {
      width: 390px;
      height: 844px;
      border-radius: 44px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 40px 100px rgba(0,0,0,0.6);
      position: relative;
      flex-shrink: 0;
    }
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: #F5F3EF;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s;
    }
    .screen.hidden-left  { transform: translateX(-100%); opacity: 0; pointer-events: none; }
    .screen.hidden-right { transform: translateX( 100%); opacity: 0; pointer-events: none; }
    .pill-track {
      position: absolute;
      bottom: 14px;
      left: 0; right: 0;
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
    }
    .pill-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(28,27,25,0.15);
      transition: all 0.3s;
    }
    .pill-dot.active { width: 20px; border-radius: 3px; background: #FF4422; }
  </style>
</head>
<body>

<div class="phone" id="root">
  <div class="pill-track" id="dots"></div>
</div>

<script type="text/babel">

/* ─── Data ─────────────────────────────────────────── */
const ITEMS = [
  { id: 1, name: "Croque Monsieur", qty: 2, price: 22.00, unit: 11.00 },
  { id: 2, name: "Caesar Salad",    qty: 1, price: 14.50, unit: 14.50 },
  { id: 3, name: "Flat White",      qty: 2, price: 12.00, unit: 6.00  },
  { id: 4, name: "Croissant",       qty: 3, price: 18.00, unit: 6.00  },
  { id: 5, name: "Sparkling Water", qty: 1, price: 6.00,  unit: 6.00  },
];
const SERVICE = 8.50, TAX = 3.50, TOTAL = 84.50;

const PEOPLE = [
  { name: "You",    avatar: "Y", color: "#FF4422", items: [1,3], confirmed: true  },
  { name: "Priya",  avatar: "P", color: "#5B7FFF", items: [2,4], confirmed: false },
  { name: "Marcus", avatar: "M", color: "#2BA97A", items: [1,5], confirmed: false },
  { name: "Sasha",  avatar: "S", color: "#E6A817", items: [3,4], confirmed: false },
];

const fmt = (n) => `$${n.toFixed(2)}`;

/* Daily spending for March 2026 (up to today Mar 17) */
const DAILY_SPEND = {
  2:23.50, 3:45.20, 4:12.00, 5:67.80, 6:89.00, 7:34.50,
  9:28.00, 10:56.40, 11:19.80, 12:43.20, 13:78.50, 14:22.00,
  16:31.60, 17:84.50,
};

const DAY_LABELS = ['Mo','Tu','We','Th','Fr','Sa','Su'];

/* March 1, 2026 = Sunday → offset 6 with Mon-first grid */
function buildMarchGrid() {
  const cells = Array(6).fill(null);
  for (let d = 1; d <= 31; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);
  return cells;
}

function CalendarSheet({ selectedDay, onSelect, onClose }) {
  const [sel, setSel] = React.useState(selectedDay);
  const cells = buildMarchGrid();
  const maxSpend = Math.max(...Object.values(DAILY_SPEND));

  const confirm = () => { onSelect(sel); onClose(); };

  return (
    <>
      <div onClick={onClose} style={{ position:'absolute', inset:0,
        background:'rgba(28,27,25,0.45)', zIndex:200 }} />
      <div style={{ position:'absolute', bottom:0, left:0, right:0,
        background:'#fff', borderRadius:'24px 24px 0 0', zIndex:201,
        paddingBottom:36, animation:'slideUp 0.28s cubic-bezier(0.4,0,0.2,1)' }}>

        {/* Handle */}
        <div style={{ width:36, height:4, borderRadius:2, background:C.border, margin:'12px auto 0' }} />

        {/* Month header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 24px 16px' }}>
          <span style={{ fontFamily:'Inter', fontWeight:700, fontSize:18, color:C.dark, letterSpacing:'-0.02em' }}>
            March 2026
          </span>
          <div style={{ display:'flex', gap:4 }}>
            {['‹','›'].map((ch, i) => (
              <div key={i} style={{ width:32, height:32, borderRadius:10, background:C.light,
                display:'flex', alignItems:'center', justifyContent:'center',
                fontFamily:'Inter', fontSize:18, color:C.muted, cursor:'pointer', userSelect:'none' }}>
                {ch}
              </div>
            ))}
          </div>
        </div>

        {/* Day-of-week headers */}
        <div style={{ display:'flex', paddingInline:16, marginBottom:4 }}>
          {DAY_LABELS.map(d => (
            <div key={d} style={{ flex:1, textAlign:'center', fontFamily:'Inter',
              fontWeight:500, fontSize:11, color:C.faint, letterSpacing:'0.05em' }}>{d}</div>
          ))}
        </div>

        {/* Grid */}
        <div style={{ display:'flex', flexWrap:'wrap', paddingInline:16 }}>
          {cells.map((day, i) => {
            if (!day) return <div key={`e${i}`} style={{ flex:'0 0 calc(100%/7)', height:54 }} />;
            const spend   = DAILY_SPEND[day] || 0;
            const isSel   = day === sel;
            const isToday = day === 17;
            const isFuture= day > 17;
            const barH    = spend ? Math.max(2, Math.round((spend / maxSpend) * 12)) : 0;
            return (
              <div key={day} onClick={() => !isFuture && setSel(day)}
                style={{ flex:'0 0 calc(100%/7)', height:58, display:'flex', flexDirection:'column',
                  alignItems:'center', justifyContent:'flex-start', paddingTop:4,
                  cursor: isFuture ? 'default' : 'pointer' }}>
                <div style={{ width:34, height:34, borderRadius:'50%',
                  background: isSel ? C.accent : 'transparent',
                  border: isToday && !isSel ? `1.5px solid ${C.accent}` : 'none',
                  display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <span style={{ fontFamily:'Inter', fontSize:14, letterSpacing:'-0.01em',
                    fontWeight: isSel||isToday ? 700 : 400,
                    color: isSel ? '#fff' : isFuture ? C.faint : C.dark }}>
                    {day}
                  </span>
                </div>
                {spend > 0 && (
                  <span style={{ fontFamily:'Inter', fontSize:9, fontWeight:500, marginTop:2,
                    color: isSel ? C.accent : C.muted }}>
                    ${spend < 100 ? spend.toFixed(0) : Math.round(spend)}
                  </span>
                )}
              </div>
            );
          })}
        </div>

        {/* Confirm */}
        <div style={{ padding:'12px 24px 0' }}>
          <CTAButton label={`Confirm — Mar ${sel}`} onClick={confirm} />
        </div>
      </div>
    </>
  );
}

/* ─── Shared UI ─────────────────────────────────────── */
const C = {
  bg: '#F5F3EF', dark: '#1C1B19', muted: '#8A8680',
  accent: '#FF4422', surface: '#FFFFFF', border: '#E9E5DF',
  light: '#ECEAE5', faint: '#C2BEBA', green: '#2BA97A',
};

function NavBar({ title, onBack, right }) {
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
      padding:'52px 24px 16px' }}>
      <button onClick={onBack} style={{ width:36, height:36, borderRadius:'50%',
        background:C.light, border:'none', cursor:'pointer', display:'flex',
        alignItems:'center', justifyContent:'center', flexShrink:0 }}>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8L10 13" stroke={C.dark} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </button>
      <span style={{ fontFamily:'Inter', fontWeight:600, fontSize:15, color:C.dark,
        letterSpacing:'-0.01em' }}>{title}</span>
      <div style={{ width:36, height:36, display:'flex', alignItems:'center', justifyContent:'center' }}>
        {right}
      </div>
    </div>
  );
}

function Avatar({ name, color, size = 32 }) {
  return (
    <div style={{ width:size, height:size, borderRadius:'50%', background:color,
      display:'flex', alignItems:'center', justifyContent:'center',
      fontFamily:'Inter', fontWeight:700, fontSize:size*0.38, color:'#fff',
      flexShrink:0, letterSpacing:'-0.02em' }}>
      {name[0]}
    </div>
  );
}

function CTAButton({ label, onClick, disabled }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width:'100%', background: disabled ? C.light : C.accent,
      border:'none', borderRadius:16, padding:'18px',
      display:'flex', alignItems:'center', justifyContent:'center', gap:8,
      cursor: disabled ? 'default' : 'pointer', transition:'background 0.2s' }}>
      <span style={{ fontFamily:'Inter', fontWeight:700, fontSize:16,
        color: disabled ? C.muted : '#fff', letterSpacing:'-0.01em' }}>{label}</span>
      {!disabled && <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>}
    </button>
  );
}

/* ─── Screen 0: Expense Entry ───────────────────────── */
function S0_ExpenseEntry({ go }) {
  const [splitOn,     setSplitOn]     = React.useState(false);
  const [merchant,    setMerchant]    = React.useState('Tartine Bakery');
  const [editingName, setEditingName] = React.useState(false);
  const [calOpen,     setCalOpen]     = React.useState(false);
  const [selectedDay, setSelectedDay] = React.useState(17);

  const dateLabel = selectedDay === 17 ? `Today, Mar ${selectedDay}` : `Mar ${selectedDay}, 2026`;

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', position:'relative' }}>
      {/* Nav */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'52px 28px 16px' }}>
        <div style={{ width:36, height:36, borderRadius:'50%', background:C.light,
          display:'flex', alignItems:'center', justifyContent:'center' }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 3L5 8L10 13" stroke={C.dark} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
        <span style={{ fontFamily:'Inter', fontWeight:600, fontSize:15, color:C.dark, letterSpacing:'-0.01em' }}>New Expense</span>
        <div style={{ width:36, height:36, borderRadius:'50%', background:C.light,
          display:'flex', alignItems:'center', justifyContent:'center' }}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 1L13 13M13 1L1 13" stroke={C.dark} strokeWidth="1.8" strokeLinecap="round"/>
          </svg>
        </div>
      </div>

      {/* Amount */}
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:10,
        padding:'28px 28px 24px' }}>
        <span style={{ fontFamily:'Inter', fontSize:13, color:C.muted, letterSpacing:'0.08em', textTransform:'uppercase' }}>Amount</span>
        <div style={{ display:'flex', alignItems:'flex-start', gap:4 }}>
          <span style={{ fontFamily:'Inter', fontWeight:300, fontSize:28, color:C.muted, paddingTop:10 }}>$</span>
          <span style={{ fontFamily:'Inter', fontWeight:800, fontSize:80, color:C.dark, lineHeight:1, letterSpacing:'-0.04em' }}>84.50</span>
        </div>
      </div>

      {/* Pills */}
      <div style={{ display:'flex', gap:8, padding:'0 28px 24px', overflow:'hidden' }}>
        {[['Food',true],['Shopping',false],['Transport',false],['Other',false]].map(([l,a]) => (
          <div key={l} style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 16px',
            borderRadius:100, background: a ? C.dark : C.light, flexShrink:0, cursor:'pointer' }}>
            <span style={{ fontFamily:'Inter', fontWeight:500, fontSize:13,
              color: a ? '#F5F3EF' : C.muted, whiteSpace:'nowrap' }}>{l}</span>
          </div>
        ))}
      </div>

      {/* Fields */}
      <div style={{ display:'flex', flexDirection:'column', paddingInline:28 }}>

        {/* Merchant — editable */}
        <div style={{ borderBottom:`1px solid ${C.border}`, display:'flex', flexDirection:'column', gap:5, padding:'14px 0' }}>
          <span style={{ fontFamily:'Inter', fontWeight:500, fontSize:11, color:C.muted, letterSpacing:'0.07em', textTransform:'uppercase' }}>Merchant</span>
          {editingName ? (
            <input
              autoFocus
              value={merchant}
              onChange={e => setMerchant(e.target.value)}
              onBlur={() => setEditingName(false)}
              onKeyDown={e => e.key === 'Enter' && setEditingName(false)}
              style={{ fontFamily:'Inter', fontWeight:500, fontSize:17, color:C.dark,
                letterSpacing:'-0.01em', border:'none', background:'transparent',
                outline:'none', width:'100%', padding:0 }}
            />
          ) : (
            <span onClick={() => setEditingName(true)}
              style={{ fontFamily:'Inter', fontWeight:500, fontSize:17, color:C.dark,
                letterSpacing:'-0.01em', cursor:'text', borderBottom:`1.5px solid ${C.accent}`,
                display:'inline-block', paddingBottom:1 }}>
              {merchant}
            </span>
          )}
        </div>

        {/* Date — opens calendar */}
        <div onClick={() => setCalOpen(true)}
          style={{ borderBottom:`1px solid ${C.border}`, display:'flex', flexDirection:'column', gap:5, padding:'14px 0', cursor:'pointer' }}>
          <span style={{ fontFamily:'Inter', fontWeight:500, fontSize:11, color:C.muted, letterSpacing:'0.07em', textTransform:'uppercase' }}>Date</span>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <span style={{ fontFamily:'Inter', fontWeight:500, fontSize:17, color:C.dark, letterSpacing:'-0.01em' }}>{dateLabel}</span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="2" y="3" width="12" height="11" rx="2" stroke={C.muted} strokeWidth="1.4"/>
              <path d="M5 1v3M11 1v3M2 7h12" stroke={C.muted} strokeWidth="1.4" strokeLinecap="round"/>
            </svg>
          </div>
        </div>

        {/* Notes */}
        <div style={{ borderBottom:`1px solid ${C.border}`, display:'flex', flexDirection:'column', gap:5, padding:'14px 0' }}>
          <span style={{ fontFamily:'Inter', fontWeight:500, fontSize:11, color:C.muted, letterSpacing:'0.07em', textTransform:'uppercase' }}>Notes</span>
          <span style={{ fontFamily:'Inter', fontSize:17, color:C.faint, letterSpacing:'-0.01em' }}>Add a note…</span>
        </div>

      </div>

      {/* Calendar bottom sheet */}
      {calOpen && (
        <CalendarSheet
          selectedDay={selectedDay}
          onSelect={setSelectedDay}
          onClose={() => setCalOpen(false)}
        />
      )}

      {/* Split toggle */}
      <div style={{ borderBottom:`1px solid ${C.border}`, display:'flex', flexDirection:'column' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'18px 28px' }}>
          <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
            <span style={{ fontFamily:'Inter', fontWeight:500, fontSize:15, color:C.dark, letterSpacing:'-0.01em' }}>Split with others</span>
            <span style={{ fontFamily:'Inter', fontSize:13, color:C.muted }}>Divide this expense</span>
          </div>
          <div onClick={() => setSplitOn(v => !v)} style={{
            width:44, height:26, borderRadius:100, position:'relative', cursor:'pointer',
            background: splitOn ? C.accent : C.border, transition:'background 0.25s' }}>
            <div style={{ width:20, height:20, background:'#fff', borderRadius:'50%',
              position:'absolute', top:3, transition:'left 0.25s',
              left: splitOn ? 21 : 3 }} />
          </div>
        </div>

        {/* Eating Out option — slides in when split is ON */}
        {splitOn && (
          <div onClick={() => go(1)} style={{ display:'flex', alignItems:'center', gap:12,
            padding:'14px 28px 18px', cursor:'pointer', animation:'fadeSlide 0.2s ease' }}>
            <div style={{ width:40, height:40, borderRadius:12, background:'#FFF0ED',
              display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M4 3h12v2a6 6 0 01-12 0V3z" stroke={C.accent} strokeWidth="1.5" strokeLinejoin="round"/>
                <path d="M10 9v8M7 17h6" stroke={C.accent} strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:'Inter', fontWeight:600, fontSize:14, color:C.dark, letterSpacing:'-0.01em' }}>Eating out together</div>
              <div style={{ fontFamily:'Inter', fontSize:12, color:C.muted, marginTop:1 }}>Scan the bill — everyone picks what they had</div>
            </div>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M6 3l5 5-5 5" stroke={C.faint} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
        )}
      </div>

      {/* CTA */}
      <div style={{ padding:'20px 28px 40px', marginTop:'auto' }}>
        <CTAButton label="Save Expense" onClick={() => {}} />
      </div>
    </div>
  );
}

/* ─── Screen 1: Capture Bill ────────────────────────── */
function S1_CaptureBill({ go, back }) {
  const [captured, setCaptured] = React.useState(false);
  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      <NavBar title="Scan Bill" onBack={back} />

      <div style={{ padding:'8px 28px 20px' }}>
        <p style={{ fontFamily:'Inter', fontSize:14, color:C.muted, lineHeight:'20px' }}>
          {captured ? 'Looking good? We\'ll extract the items.' : 'Point your camera at the full receipt.'}
        </p>
      </div>

      {/* Viewfinder / Captured preview */}
      <div style={{ margin:'0 28px', flex:1, borderRadius:20, overflow:'hidden',
        background: captured ? '#1a1a17' : '#0f0f0e', position:'relative',
        display:'flex', alignItems:'center', justifyContent:'center', maxHeight:420 }}>

        {!captured ? (
          <>
            {/* Corner guides */}
            {[['0%','0%','right','bottom'],['100%','0%','left','bottom'],
              ['0%','100%','right','top'],['100%','100%','left','top']].map(([l,t,br,bb], i) => (
              <div key={i} style={{ position:'absolute', left:l, top:t, width:28, height:28,
                borderRight: br==='right' ? 'none' : `2px solid rgba(255,68,34,0.7)`,
                borderLeft:  br==='right' ? `2px solid rgba(255,68,34,0.7)` : 'none',
                borderBottom: bb==='bottom' ? 'none' : `2px solid rgba(255,68,34,0.7)`,
                borderTop:    bb==='bottom' ? `2px solid rgba(255,68,34,0.7)` : 'none',
                margin:16, borderRadius:2 }} />
            ))}
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12, opacity:0.4 }}>
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <rect x="8" y="12" width="32" height="26" rx="4" stroke="white" strokeWidth="2"/>
                <circle cx="24" cy="25" r="8" stroke="white" strokeWidth="2"/>
                <circle cx="24" cy="25" r="3" fill="white" opacity="0.4"/>
                <path d="M18 12V9a2 2 0 012-2h8a2 2 0 012 2v3" stroke="white" strokeWidth="2"/>
              </svg>
              <span style={{ fontFamily:'Inter', fontSize:13, color:'white' }}>Position receipt here</span>
            </div>
          </>
        ) : (
          /* Simulated captured receipt */
          <div style={{ width:'75%', background:'#fefef8', borderRadius:8, padding:'18px 16px',
            display:'flex', flexDirection:'column', gap:6, boxShadow:'0 8px 32px rgba(0,0,0,0.4)' }}>
            <div style={{ fontFamily:'Inter', fontWeight:700, fontSize:11, textAlign:'center', color:'#222', letterSpacing:'0.1em', marginBottom:4 }}>TARTINE BAKERY</div>
            <div style={{ height:1, background:'#ddd', margin:'4px 0' }}/>
            {[['Croque Monsieur x2','22.00'],['Caesar Salad','14.50'],['Flat White x2','12.00'],['Croissant x3','18.00'],['Sparkling Water','6.00']].map(([n,p]) => (
              <div key={n} style={{ display:'flex', justifyContent:'space-between' }}>
                <span style={{ fontFamily:'Inter', fontSize:9, color:'#333' }}>{n}</span>
                <span style={{ fontFamily:'Inter', fontSize:9, color:'#333' }}>${p}</span>
              </div>
            ))}
            <div style={{ height:1, background:'#ddd', margin:'4px 0' }}/>
            <div style={{ display:'flex', justifyContent:'space-between' }}>
              <span style={{ fontFamily:'Inter', fontWeight:700, fontSize:9, color:'#111' }}>TOTAL</span>
              <span style={{ fontFamily:'Inter', fontWeight:700, fontSize:9, color:'#111' }}>$84.50</span>
            </div>
          </div>
        )}
      </div>

      <div style={{ padding:'20px 28px 40px', display:'flex', flexDirection:'column', gap:12 }}>
        {!captured ? (
          <>
            <CTAButton label="Take Photo" onClick={() => setCaptured(true)} />
            <button onClick={() => setCaptured(true)} style={{ background:'none', border:'none', cursor:'pointer',
              fontFamily:'Inter', fontWeight:500, fontSize:14, color:C.muted, padding:'8px', textAlign:'center' }}>
              Upload from Library
            </button>
          </>
        ) : (
          <>
            <CTAButton label="Use this photo" onClick={() => go(2)} />
            <button onClick={() => setCaptured(false)} style={{ background:'none', border:'none', cursor:'pointer',
              fontFamily:'Inter', fontWeight:500, fontSize:14, color:C.muted, padding:'8px', textAlign:'center' }}>
              Retake
            </button>
          </>
        )}
      </div>
    </div>
  );
}

/* ─── Screen 2: Review Items ────────────────────────── */
function S2_ReviewItems({ go, back }) {
  const [items, setItems] = React.useState(ITEMS);
  const subtotal = items.reduce((s,i) => s + i.price, 0);
  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      <NavBar title="Review Items" onBack={back}
        right={
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M13 3l2 2-9 9-3 1 1-3 9-9z" stroke={C.muted} strokeWidth="1.5" strokeLinejoin="round"/>
          </svg>
        }
      />

      {/* Summary bar */}
      <div style={{ display:'flex', alignItems:'baseline', gap:8, padding:'4px 28px 20px' }}>
        <span style={{ fontFamily:'Inter', fontWeight:800, fontSize:36, color:C.dark, letterSpacing:'-0.04em' }}>{fmt(TOTAL)}</span>
        <span style={{ fontFamily:'Inter', fontSize:13, color:C.muted }}>· {items.length} items found</span>
      </div>

      {/* Items list */}
      <div style={{ flex:1, overflowY:'auto', paddingInline:28, display:'flex', flexDirection:'column' }}>
        {items.map((item, idx) => (
          <div key={item.id} style={{ display:'flex', alignItems:'center', gap:12,
            padding:'14px 0', borderBottom: idx < items.length-1 ? `1px solid ${C.border}` : 'none' }}>
            <div style={{ width:36, height:36, borderRadius:10, background:C.light,
              display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
              fontFamily:'Inter', fontWeight:600, fontSize:11, color:C.muted }}>
              ×{item.qty}
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:'Inter', fontWeight:500, fontSize:15, color:C.dark, letterSpacing:'-0.01em' }}>{item.name}</div>
              <div style={{ fontFamily:'Inter', fontSize:12, color:C.muted, marginTop:2 }}>
                {item.qty > 1 ? `${fmt(item.unit)} each` : ''}

            </div>
            <span style={{ fontFamily:'Inter', fontWeight:600, fontSize:15, color:C.dark, letterSpacing:'-0.02em' }}>{fmt(item.price)}</span>
          </div>
        ))}

        {/* Service + Tax */}
        <div style={{ display:'flex', alignItems:'center', gap:12, padding:'14px 0', borderTop:`1px solid ${C.border}` }}>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:'Inter', fontSize:13, color:C.muted }}>Service charge (10%)</div>
          </div>
          <span style={{ fontFamily:'Inter', fontSize:13, color:C.muted }}>{fmt(SERVICE)}</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:12, padding:'0 0 20px' }}>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:'Inter', fontSize:13, color:C.muted }}>Tax</div>
          </div>
          <span style={{ fontFamily:'Inter', fontSize:13, color:C.muted }}>{fmt(TAX)}</span>

      <div style={{ padding:'16px 28px 40px', borderTop:`1px solid ${C.border}` }}>

}

/* ─── Screen 3: Share Link ──────────────────────────── */

      <NavBar title="Invite Group" onBack={back} />

        <p style={{ fontFamily:'Inter', fontSize:14, color:C.muted, lineHeight:'20px' }}>
          Everyone picks what they ordered — then we calculate who owes what.
        </p>
      </div>

      {/* Link card */}
      <div style={{ margin:'0 28px', background:C.light, borderRadius:16,
        padding:'16px', display:'flex', alignItems:'center', gap:12 }}>
        <div style={{ flex:1, overflow:'hidden' }}>
          <div style={{ fontFamily:'Inter', fontWeight:500, fontSize:11, color:C.muted,
            letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:4 }}>Share link</div>
          <div style={{ fontFamily:'Inter', fontSize:13, color:C.dark, overflow:'hidden',
            textOverflow:'ellipsis', whiteSpace:'nowrap' }}>tartine.split.app/abc123</div>

        <button onClick={copy} style={{ flexShrink:0, background: copied ? C.green : C.dark,

      {/* People */}
      <div style={{ padding:'28px 28px 0' }}>

        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:0 }}>

              <Avatar name={p.name} color={p.color} size={36} />
              <div style={{ flex:1 }}>
                <div style={{ fontFamily:'Inter', fontWeight:500, fontSize:15, color:C.dark,
                  letterSpacing:'-0.01em' }}>{p.name}</div>
              </div>
              {p.confirmed
                ? <div style={{ display:'flex', alignItems:'center', gap:5 }}>
                    <div style={{ width:8, height:8, borderRadius:'50%', background:C.green }} />
                    <span style={{ fontFamily:'Inter', fontSize:12, color:C.green, fontWeight:500 }}>Confirmed</span>
                  </div>
                : <div style={{ display:'flex', alignItems:'center', gap:5 }}>
                    <div style={{ width:8, height:8, borderRadius:'50%', background:C.faint }} />

          ))}
        </div>

      <div style={{ padding:'24px 28px 40px', marginTop:'auto' }}>

/* ─── Screen 4: Guest Picks Items ───────────────────── */
// Simulate: guest is "Priya". Other people's picks already known from PEOPLE.
const OTHERS = PEOPLE.filter(p => p.name !== 'Priya');

function S4_GuestPicks({ go, back }) {
  const [selected, setSelected] = React.useState(new Set());

  const toggle = (id) => setSelected(prev => {
    const s = new Set(prev);
    s.has(id) ? s.delete(id) : s.add(id);
    return s;
  });

  // How many others already picked this item
  const otherCount = (id) => OTHERS.filter(p => p.items.includes(id)).length;

  // Price this guest pays: item.price / (others + 1 if selected, else just show item.price)
  const myShare = (item) => {
    if (!selected.has(item.id)) return null;
    return item.price / (otherCount(item.id) + 1);
  };

  const total = ITEMS.reduce((s, item) => {
    const share = myShare(item);
    return s + (share || 0);
  }, 0);

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', background:'#fff' }}>
      {/* Guest header */}
      <div style={{ background:C.dark, padding:'52px 28px 24px', display:'flex', flexDirection:'column', gap:6 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:4 }}>
          <Avatar name="T" color={C.accent} size={28} />
          <span style={{ fontFamily:'Inter', fontSize:13, color:'rgba(255,255,255,0.5)' }}>Tartine Bakery · Mar 17</span>
        </div>
        <h1 style={{ fontFamily:'Inter', fontWeight:800, fontSize:28, color:'#fff', letterSpacing:'-0.03em', lineHeight:'1.1' }}>
          What did<br/>you have?
        </h1>
        <p style={{ fontFamily:'Inter', fontSize:13, color:'rgba(255,255,255,0.45)', marginTop:4 }}>
          Tap items you ordered — shared items split automatically
        </p>
      </div>

      {/* Items */}
      <div style={{ flex:1, overflowY:'auto', paddingInline:28, background:'#fff' }}>
        {ITEMS.map((item, idx) => {
          const sel     = selected.has(item.id);
          const others  = OTHERS.filter(p => p.items.includes(item.id));
          const share   = myShare(item);
          const splitBy = sel ? others.length + 1 : others.length;

          return (
            <div key={item.id} onClick={() => toggle(item.id)}
              style={{ display:'flex', alignItems:'flex-start', gap:12, padding:'16px 0',
                borderBottom: idx < ITEMS.length-1 ? `1px solid ${C.border}` : 'none',
                cursor:'pointer' }}>

              {/* Checkbox */}
              <div style={{ width:22, height:22, borderRadius:6, flexShrink:0, marginTop:2, transition:'all 0.15s',
                background: sel ? C.accent : 'transparent',
                border: sel ? 'none' : `1.5px solid ${C.border}`,
                display:'flex', alignItems:'center', justifyContent:'center' }}>
                {sel && <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path d="M2 6l3 3 5-5" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>}
              </div>

              {/* Name + sharing info */}
              <div style={{ flex:1 }}>
                <div style={{ fontFamily:'Inter', fontWeight:500, fontSize:15, color:C.dark, letterSpacing:'-0.01em' }}>
                  {item.name}
                </div>
                {others.length > 0 && (
                  <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:5 }}>
                    <div style={{ display:'flex' }}>
                      {others.map((p, i) => (
                        <div key={p.name} style={{ marginLeft: i === 0 ? 0 : -6 }}>
                          <Avatar name={p.name} color={p.color} size={18} />
                        </div>
                      ))}
                    </div>
                    <span style={{ fontFamily:'Inter', fontSize:11, color:C.muted }}>
                      {others.map(p => p.name).join(', ')} {others.length === 1 ? 'also had this' : 'also had this'}
                      {sel ? ` — split ${splitBy} ways` : ''}
                    </span>
                  </div>
                )}
              </div>

              {/* Price */}
              <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', flexShrink:0 }}>
                {sel && others.length > 0 ? (
                  <>
                    <span style={{ fontFamily:'Inter', fontWeight:700, fontSize:15, color:C.accent, letterSpacing:'-0.02em' }}>
                      {fmt(share)}
                    </span>
                    <span style={{ fontFamily:'Inter', fontSize:11, color:C.faint, textDecoration:'line-through', marginTop:1 }}>
                      {fmt(item.price)}
                    </span>
                  </>
                ) : (
                  <span style={{ fontFamily:'Inter', fontWeight: sel?700:500, fontSize:15,
                    color: sel ? C.accent : C.muted, letterSpacing:'-0.02em', transition:'all 0.15s' }}>
                    {fmt(item.price)}
                  </span>
                )}
              </div>
            </div>
          );
        })}
        <div style={{ height:130 }} />
      </div>

      {/* Sticky bottom */}
      <div style={{ position:'absolute', bottom:0, left:0, right:0,
        background:'#fff', borderTop:`1px solid ${C.border}`,
        padding:'16px 28px 36px', display:'flex', flexDirection:'column', gap:12 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
          <span style={{ fontFamily:'Inter', fontSize:13, color:C.muted }}>Your share</span>
          <span style={{ fontFamily:'Inter', fontWeight:800, fontSize:28, color:C.dark, letterSpacing:'-0.04em' }}>
            {fmt(total)}
          </span>
        </div>
        <CTAButton label="Confirm my order" onClick={() => go(5)} disabled={selected.size === 0} />
      </div>
    </div>
  );
}

/* ─── Screen 5: Final Split Summary ─────────────────── */
function S5_Summary({ back }) {
  const perHead = (SERVICE + TAX) / PEOPLE.length;

  // Count how many people claimed each item
  const claims = {};
  PEOPLE.forEach(p => p.items.forEach(id => {
    claims[id] = (claims[id] || 0) + 1;
  }));

  // A person's share of one item
  const itemShare = (id) => {
    const item = ITEMS.find(i => i.id === id);
    return item.price / claims[id];
  };

  const personTotal = (p) =>
    p.items.reduce((s, id) => s + itemShare(id), 0) + perHead;

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      <NavBar title="All confirmed" onBack={back}
        right={
          <div style={{ width:28, height:28, borderRadius:'50%', background:'#EAFAF3',
            display:'flex', alignItems:'center', justifyContent:'center' }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 7l4 4 6-7" stroke={C.green} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
        }
      />

      <div style={{ padding:'4px 28px 20px' }}>
        <p style={{ fontFamily:'Inter', fontSize:14, color:C.muted, lineHeight:'20px' }}>
          Shared items have been split between everyone who had them.
        </p>
      </div>

      {/* Breakdown cards */}
      <div style={{ flex:1, overflowY:'auto', padding:'0 28px', display:'flex', flexDirection:'column', gap:10 }}>
        {PEOPLE.map((p) => {
          const total = personTotal(p);
          const isYou = p.name === 'You';
          return (
            <div key={p.name} style={{ background: isYou ? '#FFF5F3' : C.light,
              borderRadius:16, padding:'16px', border: isYou ? `1px solid #FFD5CE` : 'none' }}>

              {/* Person header */}
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
                <Avatar name={p.name} color={p.color} size={32} />
                <div style={{ flex:1 }}>
                  <div style={{ fontFamily:'Inter', fontWeight:600, fontSize:14, color:C.dark }}>
                    {isYou ? 'You' : p.name}
                  </div>
                </div>
                <span style={{ fontFamily:'Inter', fontWeight:800, fontSize:20,
                  color: isYou ? C.accent : C.dark, letterSpacing:'-0.03em' }}>
                  {fmt(total)}
                </span>
              </div>

              {/* Item lines */}
              {p.items.map(id => {
                const item   = ITEMS.find(i => i.id === id);
                const share  = itemShare(id);
                const shared = claims[id] > 1;
                return (
                  <div key={id} style={{ display:'flex', justifyContent:'space-between',
                    alignItems:'baseline', padding:'3px 0', paddingLeft:42 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                      <span style={{ fontFamily:'Inter', fontSize:13, color:C.muted }}>{item.name}</span>
                      {shared && (
                        <span style={{ fontFamily:'Inter', fontSize:10, color:C.faint,
                          background:C.border, borderRadius:4, padding:'1px 5px' }}>
                          ÷{claims[id]}
                        </span>
                      )}
                    </div>
                    <div style={{ display:'flex', alignItems:'baseline', gap:5 }}>
                      {shared && (
                        <span style={{ fontFamily:'Inter', fontSize:11, color:C.faint,
                          textDecoration:'line-through' }}>{fmt(item.price)}</span>
                      )}
                      <span style={{ fontFamily:'Inter', fontSize:13, color:C.muted }}>{fmt(share)}</span>
                    </div>
                  </div>
                );
              })}

              {/* Tax & service */}
              <div style={{ display:'flex', justifyContent:'space-between', padding:'5px 0 0', paddingLeft:42,
                marginTop:4, borderTop:`1px solid rgba(0,0,0,0.05)` }}>
                <span style={{ fontFamily:'Inter', fontSize:12, color:C.faint }}>Tax & service (split equally)</span>
                <span style={{ fontFamily:'Inter', fontSize:12, color:C.faint }}>{fmt(perHead)}</span>
              </div>
            </div>
          );
        })}
        <div style={{ height:20 }} />
      </div>

      <div style={{ padding:'16px 28px 40px', borderTop:`1px solid ${C.border}` }}>
        <CTAButton label="Request payments" onClick={() => {}} />
      </div>
    </div>
  );
}

/* ─── App Shell ──────────────────────────────────────── */
const SCREEN_COUNT = 6;

function App() {
  const [screen, setScreen] = React.useState(0);

  React.useEffect(() => {
    // Update dots
    const dots = document.getElementById('dots');
    if (!dots) return;
    dots.innerHTML = '';
    for (let i = 0; i < SCREEN_COUNT; i++) {
      const d = document.createElement('div');
      d.className = 'pill-dot' + (i === screen ? ' active' : '');
      dots.appendChild(d);
    }
  }, [screen]);

  const go   = (n) => setScreen(n);
  const back = ()  => setScreen(s => Math.max(0, s - 1));

  const cls = (n) => {
    if (n === screen) return 'screen';
    if (n < screen)  return 'screen hidden-left';
    return 'screen hidden-right';
  };

  return (
    <>
      <div className={cls(0)}><S0_ExpenseEntry go={go} back={back} /></div>
      <div className={cls(1)}><S1_CaptureBill  go={go} back={back} /></div>
      <div className={cls(2)}><S2_ReviewItems  go={go} back={back} /></div>
      <div className={cls(3)}><S3_ShareLink    go={go} back={back} /></div>
      <div className={cls(4)}><S4_GuestPicks   go={go} back={back} /></div>
      <div className={cls(5)}><S5_Summary             back={back} /></div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

    from { transform:translateY(100%); }
    to   { transform:translateY(0); }
  }
</style>
